name: Release

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: 'tag (e.g., v1.0.0-alpha.1, v1.0.0-beta.1)'
        required: true
        default: 'latest'
      reason:
        description: 'Reason for manual publish'
        required: false

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GH_TOKEN: ${{ github.token }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name || github.event.inputs.tag }}"
          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          $ver = $tag -replace '^v', ''
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Publish
        run: |
          dotnet publish src\DeviceHub.Service.Api `
            -c Release -r win-x64 --self-contained true `
            /p:Version="$env:VERSION" `
            -o output\publish\win-x64

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --limit-output

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            deploy\windows\devicehub.iss `
            /DMyAppVersion="$env:VERSION" `
            /DPublishDir="$pwd\output\publish\win-x64" `
            /O"$pwd\output"

      - name: Compute hash
        shell: pwsh
        run: |
          $exe = "output\DeviceHub-Setup-$env:VERSION.exe"
          $hash = Get-FileHash $exe -Algorithm SHA256
          "$($hash.Hash.ToLower()) *$(Split-Path $exe -Leaf)" | Out-File "$exe.sha256" -Encoding ASCII
          Write-Host "SHA256: $($hash.Hash.ToLower())"

      - name: Create Release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          gh release create "$env:TAG" `
            --title "DeviceHub $env:TAG" `
            --notes "${{ github.event.inputs.reason || 'Manual release' }}" `
            --generate-notes `
            --repo ${{ github.repository }} 2>$null

      - name: Upload to Release
        shell: pwsh
        run: |
          gh release upload "$env:TAG" `
            "output\DeviceHub-Setup-$env:VERSION.exe" `
            "output\DeviceHub-Setup-$env:VERSION.exe.sha256" `
            --repo ${{ github.repository }} `
            --clobber

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install nfpm
        run: |
          gh release download --repo goreleaser/nfpm --pattern "nfpm_amd64.deb" --output /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb
          echo "nfpm $(nfpm --version)"

      - name: Set tag
        run: |
          tag="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          echo "TAG=$tag" >> $GITHUB_ENV
          ver=$(echo "$tag" | sed 's/^v//')
          echo "VERSION=$ver" >> $GITHUB_ENV

      - name: Publish
        run: |
          dotnet publish src/DeviceHub.Service.Api \
            -c Release -r linux-x64 --self-contained true \
            /p:Version="$VERSION" \
            -o output/publish/linux-x64

      - name: Package
        run: |
          pkgdir="output/devicehub-$VERSION"
          mkdir -p "$pkgdir"
          cp -r output/publish/linux-x64/* "$pkgdir/"
          cp deploy/linux/devicehub.service "$pkgdir/"
          cp deploy/linux/install.sh "$pkgdir/"
          cp deploy/linux/uninstall.sh "$pkgdir/"
          cp deploy/linux/postinst.sh "$pkgdir/"
          cp deploy/linux/prerm.sh "$pkgdir/"
          chmod +x "$pkgdir/install.sh"

          # tar.gz
          cd output
          tar czf "DeviceHub-$VERSION-linux-x64.tar.gz" "devicehub-$VERSION"
          sha256sum "DeviceHub-$VERSION-linux-x64.tar.gz" \
            > "DeviceHub-$VERSION-linux-x64.tar.gz.sha256"

          # .deb / .rpm via nfpm
          cd "$GITHUB_WORKSPACE"
          cat > .nfpm.yaml << EOF
name: "devicehub"
arch: "amd64"
platform: linux
version: "$VERSION"
section: net
priority: optional
maintainer: "DeviceHub Team"
description: |-
  DeviceHub — Hardware device management service
  Provides PCSC card reader, printer, and ID card reader management
homepage: "https://github.com/abcsxl/DeviceHub"
license: MIT

contents:
  - src: "$pkgdir/"
    dst: /usr/local/bin/devicehub/
  - src: "$pkgdir/devicehub.service"
    dst: /etc/systemd/system/devicehub.service

overrides:
  deb:
    depends:
      - libc6
      - libstdc++6
      - pcscd
      - cups
  rpm:
    depends:
      - glibc
      - libstdc++
      - pcsc-lite
      - cups-libs

scripts:
  postinstall: $pkgdir/postinst.sh
  preremove: $pkgdir/prerm.sh
EOF
          nfpm package -p deb -f .nfpm.yaml
          nfpm package -p rpm -f .nfpm.yaml
          mv devicehub_*.deb output/
          # RPM ~ → _ for GitHub upload compat
          for f in devicehub-*.rpm; do
            [ -f "$f" ] || continue
            mv "$f" "${f//\~/_}" 2>/dev/null || true
          done
          mv devicehub-*.rpm output/
          rm -f .nfpm.yaml
          cd output
          for f in devicehub_*.deb devicehub-*.rpm; do
            [ -f "$f" ] && sha256sum "$f" > "$f.sha256"
          done

      - name: Create Release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          gh release create "$TAG" \
            --title "DeviceHub $TAG" \
            --notes "${{ github.event.inputs.reason || 'Manual release' }}" \
            --generate-notes \
            --repo ${{ github.repository }} 2>/dev/null || true

      - name: Upload to Release
        run: |
          gh release upload "$TAG" \
            output/DeviceHub-$VERSION-linux-x64.tar.gz \
            output/DeviceHub-$VERSION-linux-x64.tar.gz.sha256 \
            --repo ${{ github.repository }} \
            --clobber
          for f in output/devicehub_*.deb output/devicehub_*.deb.sha256 \
                   output/devicehub-*.rpm output/devicehub-*.rpm.sha256; do
            [ -f "$f" ] || continue
            gh release upload "$TAG" "$f" \
              --repo ${{ github.repository }} \
              --clobber 2>/dev/null || true
          done

  generate-versions:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set tag
        run: |
          tag="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          echo "TAG=$tag" >> $GITHUB_ENV
          ver=$(echo "$tag" | sed 's/^v//')
          echo "VERSION=$ver" >> $GITHUB_ENV

      - name: Download installer hashes
        run: |
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern '*sha256'

      - name: Generate versions.json
        run: |
          repo="${{ github.repository }}"
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > versions.json <<EOF
          {
            "version": "$VERSION",
            "pubTime": "$timestamp",
            "platforms": {
              "win-x64": {
                "url": "https://github.com/$repo/releases/download/$TAG/DeviceHub-Setup-$VERSION.exe",
                "hash": "$(cat DeviceHub-Setup-*.sha256 | head -1 | cut -d' ' -f1)"
              },
              "linux-x64": {
                "url": "https://github.com/$repo/releases/download/$TAG/DeviceHub-$VERSION-linux-x64.tar.gz",
                "hash": "$(cat DeviceHub-*-linux-x64.tar.gz.sha256 | head -1 | cut -d' ' -f1)"
              },
              "linux-x64-deb": {
                "url": "https://github.com/$repo/releases/download/$TAG/devicehub_$VERSION_amd64.deb",
                "hash": "$(cat devicehub_*.deb.sha256 | head -1 | cut -d' ' -f1)"
              },
              "linux-x64-rpm": {
                "url": "https://github.com/$repo/releases/download/$TAG/devicehub-$(echo $VERSION | sed 's/-/_/g')-1.x86_64.rpm",
                "hash": "$(cat devicehub-*.rpm.sha256 | head -1 | cut -d' ' -f1)"
              }
            }
          }
          EOF

      - name: Upload versions.json to Release
        run: |
          gh release upload "$TAG" \
            versions.json \
            --repo ${{ github.repository }} \
            --clobber
